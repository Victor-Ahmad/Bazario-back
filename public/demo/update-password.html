<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Update Password</title>
        <link rel="stylesheet" href="./assets/css/app.css" />
    </head>
    <body>
        <div id="appHeader"></div>
        <script type="module" src="./assets/js/header.js"></script>

        <main class="page">
            <section class="right">
                <form id="updatePasswordForm" class="card" novalidate>
                    <div class="field">
                        <label id="lblOldPassword" for="old_password"
                            >Current Password</label
                        >
                        <input
                            id="old_password"
                            name="old_password"
                            type="password"
                            autocomplete="current-password"
                            required
                        />
                        <small class="error" data-error-for="old_password"></small>
                    </div>

                    <div class="field">
                        <label id="lblNewPassword" for="password"
                            >New Password</label
                        >
                        <input
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="new-password"
                            minlength="6"
                            required
                        />
                        <small class="error" data-error-for="password"></small>
                    </div>

                    <div class="field">
                        <label id="lblPasswordConfirm" for="password_confirmation"
                            >Confirm New Password</label
                        >
                        <input
                            id="password_confirmation"
                            name="password_confirmation"
                            type="password"
                            autocomplete="new-password"
                            minlength="6"
                            required
                        />
                        <small
                            class="error"
                            data-error-for="password_confirmation"
                        ></small>
                    </div>

                    <button id="submitBtn" type="submit">Update Password</button>
                </form>
            </section>

            <section class="left">
                <div class="brand">
                    <div class="toolbar">
                        <div id="badgeText" class="badge">Marketplace Demo</div>

                        <div class="langWrap">
                            <label class="srOnly" for="langSelect">Language</label>
                            <select id="langSelect" aria-label="Language">
                                <option value="en">English</option>
                                <option value="ar">Arabic</option>
                                <option value="de">German</option>
                            </select>
                        </div>
                    </div>

                    <h1 id="pageTitle">Update Password</h1>
                    <p id="pageSubtitle" class="subtitle">
                        Enter your current password and choose a new one.
                    </p>
                </div>

                <section class="status">
                    <div class="statusHeader">
                        <h2 id="statusTitle">Status</h2>

                        <span id="statusPill" class="pill">
                            <span class="code">—</span>
                            <span class="label">Not sent</span>
                        </span>
                    </div>

                    <div id="statusMeta" class="statusMeta">
                        <code>POST</code> <code>/api/update-password</code>
                    </div>

                    <div id="statusBox" class="statusBox">Ready.</div>
                    <pre
                        id="debugBox"
                        class="debugBox"
                        style="display: none"
                    ></pre>
                </section>
            </section>
        </main>

        <script type="module" src="./assets/js/update-password.js"></script>
    </body>
</html>
